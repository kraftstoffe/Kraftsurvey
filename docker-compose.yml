# Kraftstoff Survey — Coolify production (survey.kraftstoff.app)
#
# Canonical compose file (edit this).
# Coolify may load docker-compose.yaml which includes this file.
# Domain (app service): https://survey.kraftstoff.app:3000
# (Coolify UI — must include :3000; compose also sets SERVICE_FQDN_APP_3000)
#
# Required environment:
#   DATABASE_URL, JWT_SECRET, NEXT_PUBLIC_APP_URL

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://build:build@127.0.0.1:5432/build}
        JWT_SECRET: ${JWT_SECRET:-build-stub-jwt-secret-for-docker-build-only}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://survey.kraftstoff.app}
    image: kraftstoff-survey:latest
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://survey.kraftstoff.app}
      # Coolify Traefik routing — domain must include https:// (port is in the var name)
      SERVICE_FQDN_APP_3000: ${SERVICE_FQDN_APP_3000:-https://survey.kraftstoff.app}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
