# Kraftstoff Survey — Coolify production (survey.kraftstoff.app)
#
# Compose file: docker-compose.yml
# Domain (service app): https://survey.kraftstoff.app:3000
#
# Coolify Environment (Runtime) — set ONLY these:
#   POSTGRES_PASSWORD  (openssl rand -hex 16)
#   JWT_SECRET         (openssl rand -hex 32)
#   NEXT_PUBLIC_APP_URL = https://survey.kraftstoff.app  (+ Buildtime)
#
# Do NOT set DATABASE_URL in Coolify — it is wired automatically below.
# If DATABASE_URL exists in Coolify with the old build stub, DELETE it.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: survey
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify Environment}
      POSTGRES_DB: kraftstoff_survey
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey -d kraftstoff_survey"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://build:build@127.0.0.1:5432/build
        JWT_SECRET: build-stub-jwt-secret-for-docker-build-only
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://survey.kraftstoff.app}
    image: kraftstoff-survey:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      # Use SURVEY_DATABASE_URL — Coolify must NOT inject DATABASE_URL (stale build stub overrides compose)
      SURVEY_DATABASE_URL: postgresql://survey:${POSTGRES_PASSWORD}@postgres:5432/kraftstoff_survey?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in Coolify Environment}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://survey.kraftstoff.app}
      SERVICE_FQDN_APP_3000: ${SERVICE_FQDN_APP_3000:-https://survey.kraftstoff.app}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 90s

volumes:
  postgres-data:
