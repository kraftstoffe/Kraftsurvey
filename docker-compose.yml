# Kraftstoff Survey — Coolify production (kraftsurvey.org)
#
# Compose file: docker-compose.yml
# Domain (service app): https://kraftsurvey.org:3000
#
# Coolify Environment (Runtime) — set ONLY these:
#   POSTGRES_PASSWORD  (openssl rand -hex 16)
#   JWT_SECRET         (openssl rand -hex 32)
#   NEXT_PUBLIC_APP_URL = https://kraftsurvey.org  (+ Buildtime)
#
# Do NOT add DATABASE_URL or JWT_SECRET here — Coolify locks them in the UI.
# Runtime DB is SURVEY_DATABASE_URL; runtime auth is JWT_SECRET (see env.coolify.example).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: survey
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify Environment}
      POSTGRES_DB: kraftstoff_survey
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey -d kraftstoff_survey"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://kraftsurvey.org}
    image: kraftstoff-survey:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      # Use SURVEY_DATABASE_URL — Coolify must NOT inject DATABASE_URL (stale build stub overrides compose)
      SURVEY_DATABASE_URL: postgresql://survey:${POSTGRES_PASSWORD}@postgres:5432/kraftstoff_survey?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in Coolify Environment}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://kraftsurvey.org}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 90s

volumes:
  postgres-data:
